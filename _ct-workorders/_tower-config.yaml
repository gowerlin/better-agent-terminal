# Tower Config — better-agent-terminal (project layer)
# 建立時間:2026-04-11 09:55 (UTC+8)
# 載入優先級:session > project (本檔) > global > 預設

# 工單派發後自動開新 session 的行為
# on    = 靜默自動執行(偵測不到分頁能力時降級到剪貼簿)
# ask   = 互動式提問 [A/B/C]
# off   = 只顯示文字提示
# yolo  = on 超集,Worker 自動送出 + 塔台自主決策下一張(PLAN-020 dogfood)
auto-session: yolo

# YOLO 斷點 B 閾值(Renew ≥N 或連續 N FAILED 觸發暫停)
# 0 = 停用斷點 B / 預設 3 / dogfood 期間用 1 盡早觸發觀察
yolo_max_retries: 1

# 需求對齊最少提問輪數(0 關閉)
alignment-rounds: 3

# 選項式提問開關
interactive-prompts: on

# 經驗等級
experience-level: standard

# 工單派發摘要詳細程度
verbose: on

# 跨專案協調工單前綴(空=不啟用)
project-prefix: ""

# === v4.0 新增選項 ===

# BUG 單據追蹤（*bug 命令）
enable_bug_tracking: true

# PLAN 單據追蹤（*plan 命令）
enable_plan_tracking: true

# EXP 實驗追蹤（*exp 命令）
enable_experiments: true

# 歸檔天數門檻（*archive 判定用）
archive_days: 1

# *sync 後提示歸檔候選
auto_archive_prompt: off

# 研究型工單是否允許 Worker 互動
research_interaction: true

# 研究型工單 Worker 每次提問上限
research_max_questions: 3

# 小變動自主 commit 行為（on/ask/off）
auto_commit: ask

# 自主 commit 訊息格式模板
auto_commit_format: "chore: {description} ({scope})"
