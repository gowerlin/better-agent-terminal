# Tower Config — better-agent-terminal (project layer)
# 建立時間:2026-04-11 09:55 (UTC+8)
# 載入優先級:session > project (本檔) > global > 預設

# 工單派發後自動開新 session 的行為
# on    = 靜默自動執行(偵測不到分頁能力時降級到剪貼簿)
# ask   = 互動式提問 [A/B/C]
# off   = 只顯示文字提示
auto-session: on

# 需求對齊最少提問輪數(0 關閉)
alignment-rounds: 3

# 選項式提問開關
interactive-prompts: on

# 經驗等級
experience-level: standard

# 工單派發摘要詳細程度
verbose: on

# 跨專案協調工單前綴(空=不啟用)
project-prefix: ""
