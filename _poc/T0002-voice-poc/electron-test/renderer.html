<!DOCTYPE html>
<html>
<head>
  <title>T0002 Electron Whisper Test</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; background: #16213e; border-radius: 8px; min-height: 60px; }
    #status { color: #e94560; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>T0002 Whisper PoC - Electron Test</h1>
  <button id="btn" onclick="runTest()">Transcribe (zh-TW)</button>
  <div id="status"></div>
  <div id="resultText"></div>
  <div id="resultTime"></div>

  <script>
    async function runTest() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const resultText = document.getElementById('resultText');
      const resultTime = document.getElementById('resultTime');

      btn.disabled = true;
      status.textContent = 'Transcribing...';
      resultText.textContent = '';
      resultTime.textContent = '';

      try {
        const res = await window.api.transcribe();
        if (res.success) {
          resultText.textContent = 'Text: ' + res.text;
          resultTime.textContent = 'Time: ' + res.elapsed + 'ms';
          status.textContent = 'Done!';
          status.style.color = '#0f3460';
        } else {
          resultText.textContent = 'Error: ' + res.error;
          status.textContent = 'Failed';
        }
      } catch (err) {
        resultText.textContent = 'IPC Error: ' + err.message;
        status.textContent = 'Failed';
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
