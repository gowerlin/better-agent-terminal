name: Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本號 (e.g. 2.1.4-pre.1)，留空則自動遞增'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.VERSION }}
      tag: ${{ steps.resolve.outputs.TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 1

      - name: Fetch all tags
        run: git fetch --tags --no-recurse-submodules

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Find latest tag from fetched tags
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            if [[ -z "$LATEST_TAG" ]]; then
              LATEST_TAG="v0.0.0"
            fi
            LATEST_TAG="${LATEST_TAG#v}"
            echo "Latest tag: ${LATEST_TAG}"
            # Extract major.minor.patch (strip any -pre.N suffix)
            BASE_VER="${LATEST_TAG%%-*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VER"
            PATCH=$((PATCH + 1))
            BASE="${MAJOR}.${MINOR}.${PATCH}"
            # Check existing pre tags for this base
            PRE_NUM=1
            while git tag -l "v${BASE}-pre.${PRE_NUM}" | grep -q .; do
              PRE_NUM=$((PRE_NUM + 1))
            done
            VERSION="${BASE}-pre.${PRE_NUM}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION} (tag: v${VERSION})"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx --yes @electron/rebuild

      - name: Update version and build
        env:
          VERSION: v${{ needs.prepare.outputs.version }}
        run: node scripts/build-version.js

      - name: Package for Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package for macOS
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never

      - name: Package for Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            release/*.zip
            release/*.exe

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: release/*.dmg

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/*.AppImage

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded files
        run: ls -R artifacts

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }} (Pre-Release)
          files: |
            artifacts/release-win/*
            artifacts/release-mac/*
            artifacts/release-linux/*
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
